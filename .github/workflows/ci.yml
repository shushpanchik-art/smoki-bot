name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
      - name: Compile all .py files
        run: |
          find . -name "*.py" \
            -not -path "./venv/*" \
            -not -path "./data/*" \
            -not -path "./.git/*" \
            -print0 | xargs -0 python -m py_compile

  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff==0.15.12
      - name: Run ruff
        run: ruff check . --exclude venv --exclude data --output-format=github
        continue-on-error: true

  security:
    name: Bandit security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
      - name: Install bandit
        run: pip install bandit==1.9.4
      - name: Run bandit
        run: bandit -r . -x venv,data,__pycache__ -ll
        continue-on-error: true

  deps:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit requirements.txt
        run: pip-audit -r requirements.txt
        continue-on-error: true

  tests:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run pytest
        run: python -m pytest --cov --cov-report=term-missing --cov-fail-under=45

  codespell:
    name: codespell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: codespell-project/actions-codespell@v2
        with:
          skip: "*.db,venv,./.git,*.lock,requirements*.txt"
          ignore_words_list: "smoki,smoktolk,ba,nd,te,fo,ans"

  mypy:
    name: mypy type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy==1.14.1
      - name: Run mypy
        run: mypy bot.py config.py db/ ai/ services/ handlers/ scheduler.py

  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  yamllint:
    name: yaml lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
      - name: Install yamllint
        run: pip install yamllint==1.35.1
      - name: Run yamllint
        run: yamllint -c .yamllint .

  markdownlint:
    name: markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: '**/*.md'
          config: .markdownlint.json
